<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archidia - Minimaliste</title>

    <!-- Correction des liens : suppression des [] et () -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Helvetica', sans-serif;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body class="bg-white text-[#4B5563]">
    <nav class="p-8 flex justify-between items-center border-b border-gray-50">

        <div class="space-x-12 text-xs uppercase tracking-widest">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-24">
            <!-- Projet 1 -->
            <div>
                <div class="overflow-hidden bg-gray-100">

                </div>
                <h3 class="mt-6 text-sm uppercase tracking-widest italic">Résidence L'Horizon — 2024</h3>
            </div>

            <!-- Projet 2 -->

                </div>
