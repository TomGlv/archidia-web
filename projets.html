<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archidia | Nos Projets</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 font-['Inter']">

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center"><span class="text-xl font-black uppercase tracking-tighter">ARCHI<span class="text-orange-500">DIA</span></span></div>
            <div class="hidden md:flex space-x-8 text-[11px] uppercase font-bold tracking-[0.2em]">
                <a href="index.html" class="hover:text-orange-500 transition">Accueil</a>
                <a href="projets.html" class="text-orange-500">Nos Projets</a>
                <a href="agence.html" class="hover:text-orange-500 transition">Qui sommes-nous ?</a>
                <a href="contact.html" class="bg-gray-900 text-white px-4 py-2 hover:bg-orange-500 transition">Contact</a>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <h1 class="text-6xl font-black uppercase mb-20 tracking-tighter">Nos Réalisations</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
            <!-- New Hall -->
            <div class="space-y-4 group">
                <div class="aspect-video bg-black overflow-hidden">
                    <video controls class="w-full h-full object-cover">
                        <source src="Appartement-New-Hall/video.mp4" type="video/mp4">
                    </video>
                </div>
                <h3 class="text-2xl font-bold uppercase group-hover:text-orange-500 transition">Appartement New Hall</h3>
                <p class="text-xs text-gray-400 uppercase tracking-widest">Paris — 15 Photos</p>
            </div>

            <!-- Bougival -->
            <div class="space-y-4 group">
                <div class="aspect-video overflow-hidden">
                    <img src="Maison-Bougival/2.jpg" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700">
                </div>
                <h3 class="text-2xl font-bold uppercase group-hover:text-orange-500 transition">Maison Bougival</h3>
                <p class="text-xs text-gray-400 uppercase tracking-widest">Yvelines — 11 Photos</p>
            </div>

            <!-- Denise -->
            <div class="space-y-4 group">
                <div class="aspect-video overflow-hidden">
                    <img src="Maison-Denise/14.jpg" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700">
                </div>
                <h3 class="text-2xl font-bold uppercase group-hover:text-orange-500 transition">Maison Denise</h3>
                <p class="text-xs text-gray-400 uppercase tracking-widest">Normandie — Série complète</p>
            </div>

            <!-- Varengeville -->
            <div class="space-y-4 group">
                <div class="aspect-video overflow-hidden">
                    <img src="Maison-Varengeville/5.jpg" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700">
                </div>
                <h3 class="text-2xl font-bold uppercase group-hover:text-orange-500 transition">Maison Varengeville</h3>
                <p class="text-xs text-gray-400 uppercase tracking-widest">Seine-Maritime — 9 Photos</p>
            </div>
        </div>
    </main>

</body>
</html>
