<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archidia - Moderne</title>
    <!-- Lien corrigé -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-[#1F2937]">
    <div class="flex h-screen overflow-hidden">
        <!-- Barre latérale (Sidebar) -->
        <aside class="w-24 border-r border-gray-100 flex flex-col items-center py-10 justify-between">
            <div class="rotate-90 font-black tracking-tighter text-2xl mt-12 whitespace-nowrap">
                ARCHI<span class="text-[#F97316]">DIA</span>
            </div>
            <div class="space-y-8 flex flex-col">
                <div class="w-2 h-2 bg-[#F97316] rounded-full mx-auto"></div>
                <div class="w-2 h-2 bg-gray-200 rounded-full mx-auto"></div>
                <div class="w-2 h-2 bg-gray-200 rounded-full mx-auto"></div>
            </div>
        </aside>

        <!-- Contenu Principal -->
        <main class="flex-1 overflow-y-auto p-12">
            <div class="flex justify-between items-start mb-20">
                <h1 class="text-7xl md:text-8xl font-black uppercase leading-none tracking-tighter">
                    Built<br><span class="text-[#F97316]">Future.</span>
                </h1>
                <a href="../index.html" class="bg-[#1F2937] text-white px-6 py-3 text-xs uppercase font-bold hover:bg-[#F97316] transition-colors">
                    Menu Projets
                </a>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Image principale corrigée -->
                <div class="lg:col-span-2 h-[500px] bg-gray-100 overflow-hidden relative group">
                    <img src="https://images.unsplash.com/photo-1487958449943-2429e8be8625"
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                    <div class="absolute bottom-8 left-8 bg-[#F97316] text-white p-6 font-bold uppercase text-lg shadow-xl">
                        Projet Quartz
                    </div>
                </div>

                <!-- Bloc de texte noir -->
                <div class="h-[500px] bg-[#1F2937] p-10 flex flex-col justify-end">
                    <p class="text-[#F97316] font-bold mb-4">01 / CONCEPT</p>
                    <p class="text-white text-lg leading-relaxed">
                        Une approche brutale et fonctionnelle de l'architecture urbaine contemporaine.
                    </p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
